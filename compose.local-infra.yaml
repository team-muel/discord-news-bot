services:
  litellm:
    build:
      context: .
      dockerfile: Dockerfile.litellm
    container_name: muel-local-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      NVIDIA_NIM_API_KEY: ${NVIDIA_NIM_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness').read()
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s