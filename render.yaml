services:
  - type: web
    name: muel-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci --no-audit --no-fund; npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: START_BOT
        value: "true"
      - key: START_AUTOMATION_BOT
        value: "true"
      - key: AUTOMATION_PERSISTENT_WORKERS
        value: "true"
      - key: AUTOMATION_RUN_ON_START
        value: "true"
      - key: AUTOMATION_NEWS_ENABLED
        value: "true"
      - key: AUTOMATION_YOUTUBE_ENABLED
        value: "true"
      - key: AUTOMATION_NEWS_INTERVAL_MIN
        value: "30"
      - key: AUTOMATION_YOUTUBE_INTERVAL_MIN
        value: "10"
      - key: DISCORD_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TARGET_CHANNEL_ID
        sync: false
