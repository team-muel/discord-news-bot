services:
  - type: web
    name: muel-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci --no-audit --no-fund; npm rebuild esbuild; npm run build
    startCommand: node --import tsx server.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: START_BOT
        value: "true"
      - key: DISCORD_READY_TIMEOUT_MS
        value: "120000"
      - key: DISCORD_START_RETRIES
        value: "5"
      - key: DISCORD_MESSAGE_CONTENT_INTENT_ENABLED
        value: "false"
      - key: BOT_START_FAILURE_EXIT_ENABLED
        value: "false"
      - key: START_AUTOMATION_JOBS
        value: "true"
      - key: AUTOMATION_YOUTUBE_ENABLED
        value: "true"
      - key: AUTOMATION_NEWS_ENABLED
        value: "true"
      - key: AI_PROVIDER
        value: litellm
      - key: OPENCLAW_MODEL
        value: muel-balanced
      - key: OPENJARVIS_REQUIRE_OPENCODE_WORKER
        value: "true"
      - key: ACTION_MCP_STRICT_ROUTING
        value: "true"
      - key: MCP_IMPLEMENT_WORKER_URL
        value: https://34.56.232.61.sslip.io
      - key: MCP_OPENCODE_TOOL_NAME
        value: opencode.run
      - key: MCP_ARCHITECT_WORKER_URL
        value: https://34.56.232.61.sslip.io/architect
      - key: MCP_REVIEW_WORKER_URL
        value: https://34.56.232.61.sslip.io/review
      - key: MCP_OPERATE_WORKER_URL
        value: https://34.56.232.61.sslip.io/operate
      - key: OPENJARVIS_SERVE_URL
        value: https://34.56.232.61.sslip.io/openjarvis
      - key: MCP_WORKER_AUTH_TOKEN
        sync: false
      - key: AGENT_AUTO_ONBOARDING_ENABLED
        value: "true"
      - key: AGENT_DAILY_LEARNING_ENABLED
        value: "true"
      - key: AGENT_DAILY_LEARNING_HOUR
        value: "4"
      - key: AGENT_DAILY_MAX_GUILDS
        value: "30"
      - key: AGENT_MAX_CONCURRENT_SESSIONS
        value: "4"
      - key: AGENT_MAX_GOAL_LENGTH
        value: "1200"
      - key: SPRINT_ENABLED
        value: "true"
      - key: SPRINT_AUTONOMY_LEVEL
        value: approve-ship
      - key: SPRINT_LEARNING_JOURNAL_ENABLED
        value: "true"
      - key: SPRINT_LEARNING_JOURNAL_AUTO_APPLY_ENABLED
        value: "true"
      - key: LLM_PROVIDER_FALLBACK_CHAIN
        value: openclaw,litellm,anthropic,openai,gemini
      - key: LITELLM_ENABLED
        value: "true"
      - key: LITELLM_BASE_URL
        value: https://muel-litellm-proxy.onrender.com
      - key: LITELLM_MASTER_KEY
        sync: false
      - key: LITELLM_MODEL
        value: muel-balanced
      - key: YOUTUBE_MONITOR_INTERVAL_MS
        value: "300000"
      - key: YOUTUBE_MONITOR_MCP_STRICT
        value: "false"
      - key: NEWS_MONITOR_MCP_STRICT
        value: "false"
      - key: NEWS_MONITOR_MCP_WORKER_URL
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENCLAW_BASE_URL
        value: https://muel-litellm-proxy.onrender.com
      - key: OPENCLAW_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: WEB_SEARCH_MAX_RESULTS
        value: "5"
      - key: ACTION_NEWS_CAPTURE_ENABLED
        value: "true"
      - key: ACTION_NEWS_CAPTURE_TTL_MS
        value: "21600000"
      - key: ACTION_NEWS_CAPTURE_MIN_ITEMS
        value: "2"
      - key: ACTION_NEWS_CAPTURE_MAX_AGE_HOURS
        value: "72"
      - key: NEWS_VERIFY_SOURCE_LIMIT
        value: "4"
      - key: SPRINT_GITHUB_TOKEN
        sync: false
      - key: SPRINT_GITHUB_OWNER
        value: muel-s
      - key: SPRINT_GITHUB_REPO
        value: muel-platform
      # LLM-Wiki PR pipeline — vault GitHub target (set in Render dashboard)
      - key: OBSIDIAN_VAULT_GITHUB_OWNER
        value: team-muel
      - key: OBSIDIAN_VAULT_GITHUB_REPO
        value: discord-news-bot
      # GitHub MCP worker (optional — enables runtime GitHub operations via MCP protocol)
      - key: MCP_GITHUB_WORKER_URL
        sync: false
      # Self-improvement loop (approve-ship gate protects production)
      - key: SELF_IMPROVEMENT_CONVERGENCE_ENABLED
        value: "true"
      - key: SELF_IMPROVEMENT_CROSS_LOOP_TRACKING_ENABLED
        value: "true"
      - key: SELF_IMPROVEMENT_LACUNA_SPRINT_ENABLED
        value: "true"
      - key: SELF_IMPROVEMENT_BUGFIX_TRIGGER_ENABLED
        value: "true"
      - key: SELF_IMPROVEMENT_BENCH_REGRESSION_ENABLED
        value: "true"
      # External OSS adapters (lite mode — no CLI required, LiteLLM proxy fallback)
      - key: OPENJARVIS_ENABLED
        value: "true"
      - key: NEMOCLAW_ENABLED
        value: "true"
      - key: OPENCLAW_ENABLED
        value: "true"
      - key: OPENCLAW_GATEWAY_URL
        value: http://34.56.232.61:18789
      - key: OPENCLAW_GATEWAY_TOKEN
        sync: false
      - key: OPENCLAW_LACUNA_SKILL_CREATE_ENABLED
        value: "false"
      # Cross-model voice for sprint review phases (NemoClaw second opinion)
      - key: SPRINT_CROSS_MODEL_ENABLED
        value: "true"
      - key: SPRINT_CROSS_MODEL_PROVIDER
        value: muel-nemotron
      - key: SPRINT_CROSS_MODEL_NEMOCLAW_ENABLED
        value: "true"
      # LangGraph executor shadow (graph fidelity validation)
      - key: LANGGRAPH_EXECUTOR_SHADOW_ENABLED
        value: "true"
      - key: LANGGRAPH_EXECUTOR_SHADOW_SAMPLE_RATE
        value: "0.10"
      # ToT shadow evaluation (background comparison)
      - key: TOT_SHADOW_ENABLED
        value: "true"
      - key: TOT_AUTO_TUNE_ENABLED
        value: "true"
      # Jarvis trace feed for learning loop
      - key: JARVIS_TRACE_FEED_ENABLED
        value: "true"
      - key: OLLAMA_ADAPTER_ENABLED
        value: "true"
      - key: LITELLM_ADMIN_ADAPTER_ENABLED
        value: "true"
      - key: MCP_INDEXING_ADAPTER_ENABLED
        value: "true"
      - key: DEEPWIKI_ADAPTER_ENABLED
        value: "true"
      - key: OPENSHELL_ENABLED
        value: "true"
      - key: N8N_ENABLED
        value: "true"
      - key: N8N_DELEGATION_ENABLED
        value: "true"
      - key: N8N_WEBHOOK_NEWS_MONITOR_CANDIDATES
        sync: false
      - key: SIGNAL_BUS_ENABLED
        value: "true"
      - key: SIGNAL_BUS_WIRING_ENABLED
        value: "true"
      - key: PG_CRON_BOOTSTRAP_ENABLED
        value: "true"
      - key: PLANNER_PATTERN_CACHE_ENABLED
        value: "true"
      - key: PLANNER_PATTERN_CACHE_TTL_MS
        value: "1800000"
      # Obsidian — all vault ops routed through GCP VM via remote-mcp adapter
      - key: OBSIDIAN_VAULT_NAME
        value: docs
      - key: OBSIDIAN_REMOTE_MCP_ENABLED
        value: "true"
      - key: MCP_SHARED_MCP_URL
        value: https://34.56.232.61.sslip.io/mcp
      - key: MCP_INDEXING_REMOTE_URL
        value: https://34.56.232.61.sslip.io/mcp
      - key: OBSIDIAN_REMOTE_MCP_URL
        value: https://34.56.232.61.sslip.io/mcp
      - key: OBSIDIAN_REMOTE_MCP_TOKEN
        sync: false
      - key: OBSIDIAN_ADAPTER_ORDER
        value: "remote-mcp,local-fs"
      - key: OBSIDIAN_ADAPTER_ORDER_WRITE_NOTE
        value: "remote-mcp"
      - key: OBSIDIAN_SYNC_LOOP_ENABLED
        value: "false"
      - key: AGENT_SLO_ALERT_LOOP_OWNER
        value: "app"
      # Render API adapter (self-management)
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_ADAPTER_DISABLED
        value: "false"
      - key: DISCORD_LOGIN_SESSION_CLEANUP_OWNER
        value: "db"

  - type: web
    name: muel-litellm-proxy
    env: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./Dockerfile.litellm
    dockerContext: .
    healthCheckPath: /health/liveliness
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: NVIDIA_NIM_API_KEY
        sync: false
