services:
  - type: web
    name: discord-news-bot
    env: node
    plan: starter
    autoDeploy: true
    branch: moved/backend
    buildCommand: "npm ci"
    startCommand: "npm run start:server"
    healthCheckPath: "/health"
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: OAUTH_REDIRECT_ALLOWLIST
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: START_BOT
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FEATURE_SOURCES_ENABLED
        value: "true"
      - key: FEATURE_YOUTUBE_CRAWLER_ENABLED
        value: "true"
      - key: FEATURE_CRAWLER_SCHEDULER_ENABLED
        value: "true"
