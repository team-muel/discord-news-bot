services:
  - type: web
    name: muel-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci --no-audit --no-fund; npm rebuild esbuild; npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: START_BOT
        value: "true"
      - key: START_AUTOMATION_JOBS
        value: "false"
      - key: AUTOMATION_YOUTUBE_ENABLED
        value: "true"
      - key: AUTOMATION_NEWS_ENABLED
        value: "false"
      - key: AI_PROVIDER
        value: openclaw
      - key: OPENCLAW_MODEL
        value: muel-balanced
      - key: AGENT_AUTO_ONBOARDING_ENABLED
        value: "true"
      - key: AGENT_DAILY_LEARNING_ENABLED
        value: "true"
      - key: AGENT_DAILY_LEARNING_HOUR
        value: "4"
      - key: AGENT_DAILY_MAX_GUILDS
        value: "30"
      - key: AGENT_MAX_CONCURRENT_SESSIONS
        value: "4"
      - key: AGENT_MAX_GOAL_LENGTH
        value: "1200"
      - key: YOUTUBE_MONITOR_INTERVAL_MS
        value: "300000"
      - key: YOUTUBE_MONITOR_MCP_STRICT
        value: "false"
      - key: NEWS_MONITOR_MCP_STRICT
        value: "false"
      - key: DISCORD_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENCLAW_BASE_URL
        value: https://muel-litellm-proxy.onrender.com
      - key: OPENCLAW_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: WEB_SEARCH_MAX_RESULTS
        value: "5"
      - key: ACTION_NEWS_CAPTURE_ENABLED
        value: "true"
      - key: ACTION_NEWS_CAPTURE_TTL_MS
        value: "21600000"
      - key: ACTION_NEWS_CAPTURE_MIN_ITEMS
        value: "2"
      - key: ACTION_NEWS_CAPTURE_MAX_AGE_HOURS
        value: "72"
      - key: NEWS_VERIFY_SOURCE_LIMIT
        value: "4"

  - type: web
    name: muel-litellm-proxy
    env: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./Dockerfile.litellm
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: LITELLM_MASTER_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
