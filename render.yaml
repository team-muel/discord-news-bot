services:
  - type: web
    name: muel-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci --no-audit --no-fund; npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: START_BOT
        value: "true"
      - key: START_AUTOMATION_JOBS
        value: "false"
      - key: AUTOMATION_YOUTUBE_ENABLED
        value: "true"
      - key: YOUTUBE_MONITOR_INTERVAL_MS
        value: "300000"
      - key: DISCORD_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
