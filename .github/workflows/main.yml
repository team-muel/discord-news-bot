name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_legacy_python:
        description: "Run legacy Python bot scripts"
        required: false
        default: "false"

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  node-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v3
      - name: Show run context
        run: |
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "run_id=${GITHUB_RUN_ID}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Show Node runtime
        run: |
          node --version
          npm --version
      - name: Verify lockfile
        run: |
          pwd
          ls -la
          test -f package-lock.json || (echo "::error::package-lock.json is missing. Commit package-lock.json and rerun." && exit 1)
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run lint
      - name: API contract smoke test
        env:
          START_BOT: "false"
        run: |
          npm run start:server > server.log 2>&1 &
          for i in {1..25}; do
            if curl -fsS http://localhost:3000/health > /dev/null; then
              break
            fi
            sleep 1
          done
          npm run smoke:api

  legacy-python-check:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_legacy_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate Python syntax
        run: python -m py_compile bot_task.py youtube_monitor.py
