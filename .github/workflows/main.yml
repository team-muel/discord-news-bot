name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  node-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v3
      - name: Show run context
        run: |
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "run_id=${GITHUB_RUN_ID}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Show Node runtime
        run: |
          node --version
          npm --version
      - name: Install dependencies
        run: |
          pwd
          ls -la
          git ls-files | grep package-lock.json || true
          if [ -f package-lock.json ]; then
            echo "Using npm ci with package-lock.json"
            npm ci || {
              echo "::warning::npm ci failed; falling back to npm install"
              npm install --no-audit --no-fund
            }
          else
            echo "::warning::package-lock.json missing in runner context; falling back to npm install"
            npm install --no-audit --no-fund
          fi
      - name: Type check
        run: npm run lint
      - name: API contract smoke test
        env:
          START_BOT: "false"
        run: |
          npm run start:server > server.log 2>&1 &
          for i in {1..25}; do
            if curl -fsS http://localhost:3000/health > /dev/null; then
              break
            fi
            sleep 1
          done
          npm run smoke:api
