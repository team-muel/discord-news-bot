name: Deploy to Render

# Sunset mode: disable automatic deploy triggers for this repository.
on:
  workflow_dispatch:

jobs:
  render-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Trigger Render deploy
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ]; then
            echo "Missing Render secrets. Skipping deploy.";
            exit 0;
          fi

          SERVICE_ID="$RENDER_SERVICE_ID"
          SERVICE_ID="${SERVICE_ID#srv-}"
          SERVICE_FULL_ID="srv-$SERVICE_ID"

          KEY_PREFIX="${RENDER_API_KEY:0:4}"
          KEY_LEN=${#RENDER_API_KEY}
          echo "Render key prefix: ${KEY_PREFIX}*** (len=${KEY_LEN})"

          auth_probe=$(curl -s -o /dev/null -w "%{http_code}" -H "Accept: application/json" -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services?limit=1")
          echo "Render auth probe HTTP: $auth_probe"
          if [ "$auth_probe" = "401" ]; then
            echo "Render API auth probe failed (401). Check RENDER_API_KEY value/workspace.";
            exit 1;
          fi
          if [ "$auth_probe" = "403" ]; then
            echo "Render API auth probe failed (403). API key lacks access to this workspace/service.";
            exit 1;
          fi
          if [ "$auth_probe" -lt 200 ] || [ "$auth_probe" -ge 300 ]; then
            echo "Render API auth probe unexpected status ($auth_probe).";
            exit 1;
          fi

          service_probe=$(curl -s -o /dev/null -w "%{http_code}" -H "Accept: application/json" -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$SERVICE_FULL_ID")
          echo "Render service access probe HTTP: $service_probe ($SERVICE_FULL_ID)"
          if [ "$service_probe" = "401" ]; then
            echo "Service access probe failed (401). API key is invalid for this workspace.";
            exit 1;
          fi
          if [ "$service_probe" = "403" ]; then
            echo "Service access probe failed (403). API key cannot access this service.";
            exit 1;
          fi
          if [ "$service_probe" = "404" ]; then
            echo "Service access probe failed (404). RENDER_SERVICE_ID does not exist in this workspace.";
            exit 1;
          fi
          if [ "$service_probe" -lt 200 ] || [ "$service_probe" -ge 300 ]; then
            echo "Service access probe unexpected status ($service_probe).";
            exit 1;
          fi

          echo "Triggering deploy for service $SERVICE_FULL_ID"
          URL="https://api.render.com/v1/services/$SERVICE_FULL_ID/deploys"

          max_attempts=3
          attempt=0
          until [ $attempt -ge $max_attempts ]
          do
            attempt=$((attempt+1))
            echo "Deploy attempt $attempt"
            resp=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              --data '{"clearCache":"do_not_clear","deployMode":"build_and_deploy"}' \
              "$URL")
            if [ "$resp" -ge 200 ] && [ "$resp" -lt 300 ]; then
              echo "Render deploy triggered successfully (HTTP $resp)"
              break
            else
              echo "Render deploy attempt $attempt failed with HTTP $resp"
            fi
            sleep $((attempt * 5))
          done
          if [ $attempt -ge $max_attempts ]; then
            echo "Render deploy failed after $max_attempts attempts";
            exit 1;
          fi
