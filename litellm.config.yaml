model_list:
  - model_name: muel-fast
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: muel-balanced
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: muel-precise
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: muel-hf
    litellm_params:
      model: huggingface/Qwen/Qwen2.5-7B-Instruct
      api_key: os.environ/HF_TOKEN

  - model_name: muel-local
    litellm_params:
      model: ollama/hf.co/bartowski/nvidia_Llama-3.1-Nemotron-Nano-8B-v1-GGUF:Q4_K_M
      api_base: os.environ/OLLAMA_BASE_URL

  # Opt-in experimental and specialist aliases stay below the default front door.
  - model_name: muel-nemotron
    litellm_params:
      model: nvidia_nim/nvidia/nemotron-3-super-120b-a12b
      api_key: os.environ/NVIDIA_NIM_API_KEY

  - model_name: muel-gemma4
    litellm_params:
      model: nvidia_nim/google/gemma-4-31b-it
      api_key: os.environ/NVIDIA_NIM_API_KEY

  - model_name: muel-qwen-coder
    litellm_params:
      model: nvidia_nim/qwen/qwen2.5-coder-32b-instruct
      api_key: os.environ/NVIDIA_NIM_API_KEY

  - model_name: muel-qwen-coder-max
    litellm_params:
      model: nvidia_nim/qwen/qwen3-coder-480b-a35b-instruct
      api_key: os.environ/NVIDIA_NIM_API_KEY

  - model_name: muel-nemotron-ultra
    litellm_params:
      model: nvidia_nim/nvidia/llama-3.1-nemotron-ultra-253b-v1
      api_key: os.environ/NVIDIA_NIM_API_KEY

general_settings:
  disable_spend_logs: true
  disable_spend_updates: true
  enforce_user_param: false
  store_model_in_db: false

litellm_settings:
  fallbacks:
    - {
        "muel-balanced":
          ["muel-precise", "muel-fast", "muel-local"],
      }
    - {
        "muel-fast":
          ["muel-balanced", "muel-local"],
      }
    - {
        "muel-precise":
          ["muel-balanced", "muel-fast", "muel-local"],
      }
    - {
        "muel-local":
          ["muel-balanced"],
      }
    - {
        "muel-hf":
          ["muel-balanced", "muel-local"],
      }
    - {
        "muel-gemma4":
          ["muel-nemotron", "muel-balanced"],
      }
    - {
        "muel-qwen-coder":
          ["muel-gemma4", "muel-nemotron", "muel-balanced"],
      }
    - {
        "muel-qwen-coder-max":
          ["muel-qwen-coder", "muel-nemotron-ultra", "muel-nemotron", "muel-balanced"],
      }
    - {
        "muel-nemotron-ultra":
          ["muel-nemotron", "muel-gemma4", "muel-balanced"],
      }

router_settings:
  retry_policy:
    RateLimitErrorRetries: 0
