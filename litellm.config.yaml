model_list:
  - model_name: muel-fast
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: muel-balanced
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: muel-precise
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: muel-hf
    litellm_params:
      model: huggingface/Qwen/Qwen2.5-7B-Instruct
      api_key: os.environ/HF_TOKEN

  - model_name: muel-local
    litellm_params:
      model: ollama/qwen2.5:7b-instruct
      api_base: os.environ/OLLAMA_BASE_URL

  - model_name: muel-nemotron
    litellm_params:
      model: nvidia_nim/nvidia/nemotron-3-super-120b-a12b
      api_key: os.environ/NVIDIA_NIM_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_key_management: true
  disable_spend_logs: true
  disable_spend_updates: true
  enforce_user_param: false
  store_model_in_db: false

litellm_settings:
  fallbacks:
    - {
        "muel-balanced":
          ["muel-local", "muel-hf", "muel-fast", "muel-precise", "muel-nemotron"],
      }
    - {
        "muel-fast":
          ["muel-local", "muel-balanced", "muel-hf"],
      }
    - {
        "muel-precise":
          ["muel-balanced", "muel-fast", "muel-nemotron"],
      }

router_settings:
  retry_policy:
    RateLimitErrorRetries: 0
